name: Go CI

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+'
    paths:
      - '.github/workflows/**.yml'
      - '**.go'
      - 'go.*'
  pull_request:
    branches:
      - '**'
    paths:
      - '.github/workflows/**.yml'
      - '**.go'
      - 'go.*'

jobs:
  strongo_workflow:
    uses: strongo/go-ci-action/.github/workflows/workflow.yml@main
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
